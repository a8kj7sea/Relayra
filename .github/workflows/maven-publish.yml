name: Maven Package

on:
  release:
    types: [created]
  # push:
  #   branches:
  #     - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Publish to GitHub Packages
      run: mvn --batch-mode deploy -DskipTests -Dgpg.skip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
